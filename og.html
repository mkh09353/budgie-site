<!doctype html>

<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;background:#FBF6E9;font-family:Nunito,sans-serif;color:#272320;
    display:flex;align-items:center;gap:70px;padding:0 90px;overflow:hidden;position:relative}
  body::before{content:"";position:absolute;top:-200px;right:-150px;width:700px;height:700px;
    background:radial-gradient(circle, rgba(250,220,122,.6), rgba(250,220,122,0) 62%)}
  .tile{width:300px;height:300px;flex:none;border-radius:26%;border:5px solid #272320;
    background:linear-gradient(180deg,#FFF4CE,#FADC7A);box-shadow:14px 16px 0 rgba(39,35,32,.92);
    display:flex;align-items:center;justify-content:center;rotate:3deg;position:relative;z-index:1}
  .tile svg{width:62%;height:62%;color:#272320}
  h1{font-family:Fraunces,serif;font-weight:900;font-size:84px;line-height:1.02;letter-spacing:-.015em;position:relative;z-index:1}
  h1 em{font-style:italic;color:#C8941A}
  p{margin-top:24px;font-size:27px;font-weight:700;color:#6B6157;position:relative;z-index:1}
  .domain{position:absolute;bottom:40px;left:90px;font-family:Fraunces,serif;font-weight:900;font-size:24px;z-index:1}
</style></head>
<body>
  <div class="tile"><svg viewBox="0 0 18 18" fill="currentColor">
    <ellipse cx="9.7" cy="10.7" rx="4.4" ry="4.6"/><circle cx="6.8" cy="6.2" r="3.3"/>
    <polygon points="4.3,5 1.5,7 4.3,7.4"/><polygon points="11,10 12.6,14 17.2,16.6"/>
    <circle cx="6.1" cy="5.45" r="0.52" fill="#FADC7A"/></svg></div>
  <div>
    <h1>Hold a key.<br>Say the <em>thing.</em></h1>
    <p>Tiny, fully-offline dictation for your Mac's menu bar.<br>Free &amp; open source.</p>
  </div>
  <div class="domain">budgie.to</div>
</body></html>
